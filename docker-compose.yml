services:
  postgres:
    image: postgres:16
    container_name: agent-playground-postgres
    environment:
      POSTGRES_USER: agent_user
      POSTGRES_PASSWORD: agent_password
      POSTGRES_DB: agent_playground
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_user -d agent_playground"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
